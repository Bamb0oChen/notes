<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习笔记</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
</head>

<body>
    <div id="app"></div>
    <script type="module">
        const isDev = import.meta.env && import.meta.env.DEV;

        function injectScript(src) {
            const script = document.createElement('script');
            script.type = 'module';
            script.src = src;
            document.body.appendChild(script);
        }

        function injectCss(href) {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            document.head.appendChild(link);
        }

        async function loadFromManifest() {
            const candidates = ['./manifest.json', './.vite/manifest.json'];
            let manifest = null;
            for (const url of candidates) {
                try {
                    const response = await fetch(url, { cache: 'no-store' });
                    if (response.ok) {
                        manifest = await response.json();
                        break;
                    }
                } catch (error) {
                    // try next
                }
            }
            if (!manifest) throw new Error('manifest not found');
            const entry = manifest['src/main.js'];
            if (!entry || !entry.file) throw new Error('entry not found');
            if (Array.isArray(entry.css)) {
                entry.css.forEach(injectCss);
            }
            injectScript(`./${entry.file}`);
        }

        function loadDocsifyFallback() {
            const app = document.getElementById('app');
            if (app && !app.firstChild) {
                app.innerHTML = '<div style="text-align:center;color:#6b7280;margin-top:40vh;">Loading...</div>';
            }
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/docsify@4';
            document.body.appendChild(script);
            const prism = document.createElement('script');
            prism.src = 'https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js';
            document.body.appendChild(prism);
            const search = document.createElement('script');
            search.src = 'https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js';
            document.body.appendChild(search);
            const toc = document.createElement('script');
            toc.src = 'https://unpkg.com/docsify-plugin-toc@1.3.1/dist/docsify-plugin-toc.min.js';
            document.body.appendChild(toc);
        }

        if (isDev) {
            injectScript('/src/main.js');
        } else {
            loadFromManifest().catch(() => loadDocsifyFallback());
        }
    </script>
</body>

</html>
