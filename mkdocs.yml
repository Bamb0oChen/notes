# 最小可用 MkDocs 配置：先跑起来（Material + 搜索 + docs/）
# 说明：不依赖复杂插件；导航先交给 MkDocs 自动发现页面（不完美但可用）。

site_name: 学习笔记
repo_url: https://github.com/yanzhuchen0901/notes
repo_name: yanzhuchen0901/notes

# GitHub Pages 仓库站点（repo pages）会部署在 /notes/ 子路径下。
# 不设置会导致某些模板（尤其是 404 页面）生成以 /assets 开头的绝对路径，线上会 404。
site_url: https://yanzhuchen0901.github.io/notes/

# MkDocs 约定文档源目录为 docs/
docs_dir: docs

# 显式写出来，避免未来改动时产生不一致
use_directory_urls: true

theme:
  name: material
  language: zh
  custom_dir: overrides
  # 深黑蓝底白字（默认使用深色方案）
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色主题
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: 切换到深色主题

# 基础搜索（Material 会自动接入）
plugins:
  - search

# 样式/脚本接口：把自定义文件放进 docs/assets/ 下，然后在这里引用
extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  # MathJax 配置在 extra.js 里，必须先于 MathJax 脚本加载
  - assets/javascripts/extra.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  giscus:
    enabled: true
    repo: yanzhuchen0901/notes
    repo_id: R_kgDORKPyfQ
    category: Announcements
    category_id: DIC_kwDORKPyfc4C7H9I
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 1
    input_position: top
    lang: zh-CN
    theme: dark

# Sidebar（左侧导航）接口：使用 nav 显式声明。
# 阶段 1 你可以先不写 nav，让 MkDocs 自动发现页面；
# 等你要“固定目录结构”时，再取消注释并按需扩展。
# nav:
#   - 首页: index.md
#   - 计算机科学:
#       - 概览: computer-science/index.md
#   - 英文学习:
#       - 概览: English/index.md
#   - 数学:
#       - 概览: math/index.md
#   - 大学物理:
#       - 概览: phy/index.md
#   - 随笔集:
#       - 概览: Diary/index.md

# 先保守使用 MkDocs 内置扩展，保证通用 Markdown 可渲染
markdown_extensions:
  - toc:
      permalink: false
  - tables
  - fenced_code
  # 让 $...$ / $$...$$ 进入数学渲染管线
  - pymdownx.arithmatex:
      generic: true
